<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 4px;
      color: #fff;
    }

    .subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 20px;
    }

    .shortcut {
      display: inline-block;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 4px;
      padding: 2px 6px;
      font-family: monospace;
      font-size: 11px;
      color: #7c83ff;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #aaa;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    input, select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a2e;
      color: #e0e0e0;
      font-size: 13px;
      margin-bottom: 14px;
      outline: none;
    }

    input:focus {
      border-color: #7c83ff;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 36px;
    }

    .toggle-visibility {
      position: absolute;
      right: 8px;
      top: 8px;
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 13px;
      padding: 0;
    }

    .toggle-visibility:hover {
      color: #aaa;
    }

    button.save {
      width: 100%;
      padding: 10px;
      background: #7c83ff;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 4px;
    }

    button.save:hover {
      background: #6a71e6;
    }

    .status {
      text-align: center;
      font-size: 12px;
      color: #4caf50;
      margin-top: 8px;
      min-height: 18px;
    }

    .divider {
      border-top: 1px solid #222;
      margin: 16px 0;
    }

    .info {
      font-size: 11px;
      color: #666;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <h1>BenVoice</h1>
  <p class="subtitle">Rewrite text in Benjamin's voice</p>

  <p class="info" style="margin-bottom: 16px;">
    Select text in any text field, then:<br>
    <span class="shortcut">Ctrl+Shift+R</span> or right-click &rarr; "Rewrite in my voice"
  </p>

  <div class="divider"></div>

  <label for="endpoint">Azure Endpoint</label>
  <input type="url" id="endpoint" placeholder="https://your-resource.openai.azure.com/">

  <label for="apiKey">API Key</label>
  <div class="password-wrapper">
    <input type="password" id="apiKey" placeholder="Your Azure OpenAI API key">
    <button class="toggle-visibility" id="toggleKey" title="Show/hide key">eye</button>
  </div>

  <label for="deployment">Deployment Name</label>
  <input type="text" id="deployment" placeholder="gpt-4.1">

  <label for="apiVersion">API Version</label>
  <input type="text" id="apiVersion" placeholder="2024-12-01-preview">

  <button class="save" id="saveBtn">Save Settings</button>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
